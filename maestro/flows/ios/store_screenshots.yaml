      id: "screen-ruleset-list"
    timeout: 15000
- assertVisible:
    id: "ruleset-card-rs_weekend_friends"
- takeScreenshot: "artifacts/store_screenshots/ios/ios_01_list"
- tapOn:
    id: "ruleset-card-rs_weekend_friends"
- assertVisible:
    id: "ruleset-share-code"
- takeScreenshot: "artifacts/store_screenshots/ios/ios_02_detail"
- back
- tapOn:
    id: "action-new-ruleset"
- assertVisible:
    id: "screen-ruleset-edit"
- scrollUntilVisible:
    element: "流し満貫"
    direction: DOWN
- takeScreenshot: "artifacts/store_screenshots/ios/ios_03_edit_template"
